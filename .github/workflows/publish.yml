name: Publish to npm

on:
  push:
    tags:
      - 'v*'   # triggers on v0.1.0, v1.0.0, etc.

jobs:
  publish:
    name: Publish @neurynae/toolcairn-mcp
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages in dependency order
        run: |
          pnpm --filter @toolcairn/tsconfig build || true
          pnpm --filter @toolcairn/types build
          pnpm --filter @toolcairn/config build
          pnpm --filter @toolcairn/errors build
          pnpm --filter @toolcairn/remote build
          pnpm --filter @toolcairn/tools-local build
          pnpm --filter @neurynae/toolcairn-mcp build:publish

      - name: Publish @neurynae/toolcairn-mcp
        run: cd apps/mcp-server && npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Classify bump (patch|minor|major)
        id: bump
        run: |
          PREV=$(npm view @neurynae/toolcairn-mcp version 2>/dev/null || echo "")
          CURR=$(node -p "require('./apps/mcp-server/package.json').version")
          node scripts/classify-bump.mjs "$PREV" "$CURR"

      - name: Announce minor/major release to ToolCairn API
        if: steps.bump.outputs.kind != 'patch' && steps.bump.outputs.curr != ''
        env:
          ORIGIN_SECRET: ${{ secrets.ORIGIN_SECRET }}
          CURR: ${{ steps.bump.outputs.curr }}
          PREV: ${{ steps.bump.outputs.prev }}
          KIND: ${{ steps.bump.outputs.kind }}
        run: |
          if [ -z "$ORIGIN_SECRET" ]; then
            echo "::warning::ORIGIN_SECRET not set — skipping release announcement"
            exit 0
          fi
          curl -fsS -X POST https://api.neurynae.com/v1/internal/release-announce \
            -H "Content-Type: application/json" \
            -H "x-origin-secret: $ORIGIN_SECRET" \
            -d "{
              \"package\": \"@neurynae/toolcairn-mcp\",
              \"prev\": \"$PREV\",
              \"curr\": \"$CURR\",
              \"kind\": \"$KIND\",
              \"releaseNotesUrl\": \"https://github.com/${{ github.repository }}/releases/tag/${{ github.ref_name }}\"
            }" \
            || echo "::warning::Release announcement call failed — continuing"
